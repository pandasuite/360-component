<!DOCTYPE html>
<html>
  <head>
    <title>360 Component for PandaSuite</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0"
    />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #000000;
      }
      #viewer {
        width: 100%;
        height: 100%;
      }
      /* Scoped under #viewer so our `box-sizing` beats PSV's runtime-injected
         `.psv-container * { box-sizing: content-box }` reset (same specificity,
         injected later, so it would otherwise win). Without border-box a marker
         border would enlarge the dot past the box PSV sizes/anchors, shifting it. */
      #viewer .psv-hotspot {
        box-sizing: border-box;
        border-radius: 50%;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
        cursor: pointer;
      }
      /* Inner div of an image hotspot (the marker html is a background-image div,
         like .psv-hotspot). Scoped under #viewer for the same box-sizing cascade
         reason. No shadow (a rectangular shadow looks wrong on a transparent PNG)
         and no border-radius. Hover scaling is handled by PSV's native hoverScale
         (see baseConfig in src/index.js), NOT a CSS transform — a CSS scale here
         would grow the marker without PSV knowing and let it overlap the tooltip. */
      #viewer .psv-hotspot-img {
        cursor: pointer;
      }
      /* Video overlays follow `showControls` at runtime: VideoPlugin builds them
         once, so we always create them and hide them here when controls are off.
         `!important` is required because PSV's components show themselves via an
         inline `style.display`, which a plain class rule could not override. */
      #viewer.ps-hide-controls .psv-video-progressbar,
      #viewer.ps-hide-controls .psv-video-bigbutton {
        display: none !important;
      }
      /* Minimal, neutral loading spinner (replaces PSV's default gray disc). */
      #viewer .psv-loader-canvas,
      #viewer .psv-loader-text {
        display: none;
      }
      #viewer .psv-loader {
        width: 48px;
        height: 48px;
      }
      #viewer .psv-loader::after {
        content: "";
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.25);
        border-top-color: #ffffff;
        animation: psv-spin 0.8s linear infinite;
      }
      @keyframes psv-spin {
        to {
          transform: rotate(360deg);
        }
      }
      /* Studio-only: add-hotspot button + "click to place" hint. */
      .ps-add-btn {
        position: absolute;
        top: 12px;
        right: 12px;
        z-index: 100;
        padding: 8px 14px;
        border: none;
        border-radius: 6px;
        background: #ffffff;
        color: #111111;
        font: 600 14px sans-serif;
        cursor: pointer;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
      }
      .ps-add-hint {
        position: absolute;
        inset: 0;
        z-index: 99;
        display: none;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        color: #ffffff;
        font: 600 18px sans-serif;
        text-align: center;
        text-shadow: 0 1px 6px rgba(0, 0, 0, 0.6);
        background: rgba(0, 0, 0, 0.15);
      }
    </style>
  </head>
  <body>
    <div id="viewer"></div>
    <script type="module" src="/src/index.js"></script>
  </body>
</html>
